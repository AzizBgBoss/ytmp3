<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ytmp3</title>
<style>
/* No CSS custom properties - hardcoded for BB WebKit compatibility */
* { -webkit-box-sizing: border-box; box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0a0a0f;
  color: #c8d8c8;
  font-family: monospace;
  font-size: 14px;
  padding: 20px 10px 50px;
  text-align: center;
}

h1 {
  font-size: 2rem;
  color: #00ff88;
  letter-spacing: 4px;
  margin-bottom: 4px;
}
h1 span { color: #ff6b35; }

.sub {
  font-size: 11px;
  color: #4a5a4a;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 20px;
}

.card {
  background: #0f0f1a;
  border: 1px solid #1a1a2e;
  text-align: left;
  margin: 0 auto 16px;
  max-width: 560px;
  overflow: hidden;
}

/* Tabs */
.tabs { display: -webkit-box; display: -webkit-flex; display: flex; border-bottom: 1px solid #1a1a2e; }
.tab {
  -webkit-box-flex: 1; -webkit-flex: 1; flex: 1;
  padding: 10px 4px;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  color: #4a5a4a;
  font-family: monospace;
  font-size: 12px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: -1px;
}
.tab.on { color: #00ff88; border-bottom-color: #00ff88; }

.pane { display: none; padding: 16px; }
.pane.on { display: block; }

/* Format toggle */
.fmtrow { display: -webkit-box; display: -webkit-flex; display: flex; margin-bottom: 12px; }
.fbtn {
  -webkit-box-flex: 1; -webkit-flex: 1; flex: 1;
  background: transparent;
  border: 1px solid #1a1a2e;
  color: #4a5a4a;
  font-family: monospace;
  font-size: 12px;
  padding: 7px 4px;
  cursor: pointer;
  text-transform: uppercase;
}
.fbtn:first-child { margin-right: 6px; }
.fbtn.on { border-color: #00ff88; color: #00ff88; }
.fbtn.mp4.on { border-color: #ffe066; color: #ffe066; }

lbl {
  display: block;
  font-size: 11px;
  color: #4a5a4a;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 6px;
}

/* Input row */
.irow { display: -webkit-box; display: -webkit-flex; display: flex; }
input[type=text] {
  -webkit-box-flex: 1; -webkit-flex: 1; flex: 1;
  background: #0a0a0f;
  border: 1px solid #1a1a2e;
  border-right: none;
  color: #c8d8c8;
  font-family: monospace;
  font-size: 13px;
  padding: 9px 10px;
  outline: none;
}
input[type=text]:focus { border-color: #00ff88; }

.go {
  background: transparent;
  border: 1px solid #00ff88;
  color: #00ff88;
  font-family: monospace;
  font-size: 12px;
  padding: 9px 14px;
  cursor: pointer;
  text-transform: uppercase;
  white-space: nowrap;
}
.go:disabled { opacity: 0.4; cursor: default; }

/* Search results */
.spin { display: none; color: #4a5a4a; font-size: 12px; padding: 12px 0; text-align: center; }
#results { margin-top: 10px; }

.res {
  display: -webkit-box; display: -webkit-flex; display: flex;
  -webkit-box-align: center; -webkit-align-items: center; align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid #1a1a2e;
  cursor: pointer;
}
.res:last-child { border-bottom: none; }
.thumb {
  width: 68px; height: 38px;
  object-fit: cover;
  border: 1px solid #1a1a2e;
  margin-right: 10px;
  -webkit-flex-shrink: 0; flex-shrink: 0;
}
.rinfo { -webkit-box-flex: 1; -webkit-flex: 1; flex: 1; overflow: hidden; }
.rtitle { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.rmeta  { font-size: 11px; color: #4a5a4a; }
.rget   { font-size: 11px; color: #00ff88; border: 1px solid #1a1a2e; padding: 4px 8px; margin-left: 8px; -webkit-flex-shrink: 0; flex-shrink: 0; }
.serr   { color: #ff6b35; font-size: 12px; padding: 10px 0; }

/* Section headers */
.shdr {
  font-size: 11px;
  color: #4a5a4a;
  letter-spacing: 3px;
  text-transform: uppercase;
  border-bottom: 1px solid #1a1a2e;
  padding-bottom: 5px;
  margin: 0 auto;
  max-width: 560px;
  text-align: left;
}

/* Active jobs */
#awrap { margin-bottom: 14px; display: none; }
.job {
  background: #0f0f1a;
  border: 1px solid #1a1a2e;
  border-top: none;
  padding: 10px 12px;
  max-width: 560px;
  margin: 0 auto;
  text-align: left;
}
.job:first-child { border-top: 1px solid #1a1a2e; }

.jtop { display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-pack: justify; -webkit-justify-content: space-between; justify-content: space-between; margin-bottom: 5px; }
.jtitle { font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; -webkit-box-flex: 1; -webkit-flex: 1; flex: 1; margin-right: 8px; }
.jst { font-size: 11px; color: #4a5a4a; text-transform: uppercase; -webkit-flex-shrink: 0; flex-shrink: 0; }
.jst.downloading { color: #00ff88; }
.jst.converting  { color: #ffe066; }
.jst.done        { color: #00ff88; }
.jst.error       { color: #ff6b35; }

.bwrap { height: 3px; background: #1a1a2e; overflow: hidden; margin-bottom: 5px; }
.bfill { height: 100%; width: 0; background: #00ff88; }
.bfill.ind { width: 60%; }
.bfill.err { background: #ff6b35; width: 100%; }

.jmeta { font-size: 11px; color: #4a5a4a; }
.jdl { color: #00ff88; text-decoration: none; font-size: 12px; }
.jerr { color: #ff6b35; }

/* History */
#hwrap { }
.hist {
  background: #0f0f1a;
  border: 1px solid #1a1a2e;
  border-top: none;
  padding: 9px 12px;
  display: -webkit-box; display: -webkit-flex; display: flex;
  -webkit-box-align: center; -webkit-align-items: center; align-items: center;
  max-width: 560px;
  margin: 0 auto;
  text-align: left;
}
.hist:first-child { border-top: 1px solid #1a1a2e; }
.htitle { -webkit-box-flex: 1; -webkit-flex: 1; flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 8px; }
.hmeta  { font-size: 11px; color: #4a5a4a; margin-right: 8px; -webkit-flex-shrink: 0; flex-shrink: 0; }
.hdl    { color: #00ff88; text-decoration: none; font-size: 12px; margin-right: 8px; -webkit-flex-shrink: 0; flex-shrink: 0; }
.hdel   { background: none; border: none; color: #4a5a4a; cursor: pointer; font-size: 13px; -webkit-flex-shrink: 0; flex-shrink: 0; }
.empty  { background: #0f0f1a; border: 1px solid #1a1a2e; padding: 12px; font-size: 12px; color: #4a5a4a; max-width: 560px; margin: 0 auto; text-align: left; }
</style>
</head>
<body>

<h1>yt<span>mp3</span></h1>
<div class="sub">search &middot; download &middot; collect</div>

<div class="card">
  <div class="tabs">
    <button class="tab on" onclick="showPane('s')">&#9835; Search</button>
    <button class="tab"    onclick="showPane('u')">&#9654; URL</button>
  </div>

  <div class="pane on" id="ps">
    <div class="fmtrow">
      <button class="fbtn on"  id="fmp3" onclick="setFmt('mp3')">MP3 audio</button>
      <button class="fbtn mp4" id="fmp4" onclick="setFmt('mp4')">MP4 video (BB)</button>
    </div>
    <lbl>search youtube</lbl>
    <div class="irow">
      <input id="q" type="text" placeholder="artist, song...">
      <button class="go" id="sbtn" onclick="doSearch()">Search</button>
    </div>
    <div class="spin" id="spin">[ searching... ]</div>
    <div id="results"></div>
  </div>

  <div class="pane" id="pu">
    <div class="fmtrow">
      <button class="fbtn on"  id="fmp3u" onclick="setFmt('mp3')">MP3 audio</button>
      <button class="fbtn mp4" id="fmp4u" onclick="setFmt('mp4')">MP4 video (BB)</button>
    </div>
    <lbl>youtube url</lbl>
    <div class="irow">
      <input id="url" type="text" placeholder="https://youtube.com/watch?v=...">
      <button class="go" onclick="queueUrl()">GET</button>
    </div>
  </div>
</div>

<div id="awrap">
  <div class="shdr">active downloads</div>
  <div id="alist"></div>
</div>

<div id="hwrap">
  <div class="shdr">library</div>
  <div id="hlist"><div class="empty">no downloads yet</div></div>
</div>

<script>
/* ES3-safe JS: var only, for loops, XMLHttpRequest, no arrow functions */

function xhr(method, url, body, cb) {
  var req = new XMLHttpRequest();
  req.open(method, url, true);
  if (body !== null) { req.setRequestHeader('Content-Type', 'application/json'); }
  req.onreadystatechange = function() {
    if (req.readyState !== 4) { return; }
    var d = null;
    try { d = JSON.parse(req.responseText); } catch(e) {}
    cb(req.status, d);
  };
  req.send(body !== null ? JSON.stringify(body) : null);
}

/* Tabs */
function showPane(id) {
  var tabs  = document.querySelectorAll('.tab');
  var panes = document.querySelectorAll('.pane');
  var ids   = ['s', 'u'];
  var i;
  for (i = 0; i < ids.length; i++) {
    tabs[i].className  = 'tab'  + (ids[i] === id ? ' on' : '');
    panes[i].className = 'pane' + (ids[i] === id ? ' on' : '');
  }
}

/* Format */
var fmt = 'mp3';
function setFmt(f) {
  fmt = f;
  var btns = document.querySelectorAll('.fbtn');
  var i, el;
  for (i = 0; i < btns.length; i++) {
    el = btns[i];
    var isMp4 = (el.id.indexOf('mp4') !== -1);
    var isOn  = (isMp4 ? f === 'mp4' : f === 'mp3');
    el.className = 'fbtn' + (isMp4 ? ' mp4' : '') + (isOn ? ' on' : '');
  }
}

/* Search */
function doSearch() {
  var q = document.getElementById('q').value;
  if (!q) { return; }
  document.getElementById('sbtn').disabled = true;
  document.getElementById('spin').style.display = 'block';
  document.getElementById('results').innerHTML = '';
  xhr('POST', '/search', {q: q}, function(s, d) {
    document.getElementById('spin').style.display = 'none';
    document.getElementById('sbtn').disabled = false;
    if (!d || d.error) {
      document.getElementById('results').innerHTML = '<div class="serr">' + esc(d ? d.error : 'error') + '</div>';
      return;
    }
    if (!d.results || !d.results.length) {
      document.getElementById('results').innerHTML = '<div class="serr">no results</div>';
      return;
    }
    var html = '', i, r;
    for (i = 0; i < d.results.length; i++) {
      r = d.results[i];
      html += '<div class="res" onclick="queue(\'' + ea(r.url) + '\')">' +
        '<img class="thumb" src="' + ea(r.thumb) + '" onerror="this.style.display=\'none\'">' +
        '<div class="rinfo">' +
          '<div class="rtitle">' + esc(r.title) + '</div>' +
          '<div class="rmeta">' + esc(r.channel) + ' &middot; ' + esc(r.duration) + '</div>' +
        '</div>' +
        '<span class="rget">GET</span>' +
        '</div>';
    }
    document.getElementById('results').innerHTML = html;
  });
}

/* Queue */
function queueUrl() {
  var url = document.getElementById('url').value;
  if (url) { queue(url); }
}

function queue(url) {
  xhr('POST', '/start', {url: url, fmt: fmt}, function(s, d) {
    if (d && d.job_id) {
      document.getElementById('awrap').style.display = 'block';
      trackJob(d.job_id);
    }
  });
}

/* Job tracking */
var tracked = {};

function trackJob(id) {
  if (tracked[id]) { return; }
  tracked[id] = true;
  renderJob(id, {status: 'queued', title: '...', progress: 0, speed: '', eta: '', error: ''});
  pollJob(id);
}

function pollJob(id) {
  xhr('GET', '/status/' + id, null, function(s, d) {
    if (!d) { setTimeout(function() { pollJob(id); }, 1500); return; }
    renderJob(id, d);
    if (d.status !== 'done' && d.status !== 'error') {
      setTimeout(function() { pollJob(id); }, 1000);
    } else {
      if (d.status === 'done') { loadHistory(); }
      setTimeout(function() {
        var el = document.getElementById('job-' + id);
        if (el && el.parentNode) { el.parentNode.removeChild(el); }
        delete tracked[id];
        if (!document.getElementById('alist').firstChild) {
          document.getElementById('awrap').style.display = 'none';
        }
      }, 8000);
    }
  });
}

function renderJob(id, d) {
  var pct    = d.progress || 0;
  var isDone = d.status === 'done';
  var isErr  = d.status === 'error';
  var isInd  = (d.status === 'queued' || d.status === 'starting');
  var barCls = 'bfill' + (isErr ? ' err' : (isInd ? ' ind' : ''));
  var barW   = (isInd || isErr) ? '' : 'width:' + pct + '%;';
  var meta   = '';
  if (isDone && d.filename) {
    meta = '<a class="jdl" href="/dl/' + encodeURIComponent(d.filename) + '" download>SAVE ' + esc(d.fmt || '') + '</a>';
  } else if (isErr) {
    meta = '<span class="jerr">' + esc(d.error) + '</span>';
  } else if (d.status === 'converting') {
    meta = 'encoding for BB...';
  } else {
    meta = esc(d.speed || '') + (d.eta ? '  ETA ' + esc(d.eta) : '');
  }
  var pctTxt = (!isInd && !isErr && !isDone) ? ' ' + pct + '%' : '';
  var html =
    '<div class="job" id="job-' + id + '">' +
    '<div class="jtop">' +
      '<span class="jtitle">' + esc(d.title || '...') + '</span>' +
      '<span class="jst ' + d.status + '">' + d.status + pctTxt + '</span>' +
    '</div>' +
    '<div class="bwrap"><div class="' + barCls + '" style="' + barW + '"></div></div>' +
    '<div class="jmeta">' + meta + '</div>' +
    '</div>';
  var existing = document.getElementById('job-' + id);
  if (existing) {
    existing.outerHTML = html;
  } else {
    document.getElementById('alist').innerHTML += html;
  }
}

/* History */
function loadHistory() {
  xhr('GET', '/history', null, function(s, items) {
    var el = document.getElementById('hlist');
    if (!items || !items.length) {
      el.innerHTML = '<div class="empty">no downloads yet</div>';
      return;
    }
    var html = '', i, h, mb;
    for (i = 0; i < items.length; i++) {
      h  = items[i];
      mb = h.size ? (h.size / 1048576).toFixed(1) + 'MB' : '';
      html += '<div class="hist">' +
        '<span class="htitle">' + esc(h.title || h.filename) + '</span>' +
        '<span class="hmeta">[' + esc(h.fmt || '?') + '] ' + (mb ? mb + ' ' : '') + esc(h.date || '') + '</span>' +
        '<a class="hdl" href="/dl/' + encodeURIComponent(h.filename) + '" download>DL</a>' +
        '<button class="hdel" onclick="delFile(\'' + ea(h.filename) + '\')">X</button>' +
        '</div>';
    }
    el.innerHTML = html;
  });
}

function delFile(filename) {
  if (!confirm('Delete ' + filename + '?')) { return; }
  xhr('DELETE', '/delete/' + encodeURIComponent(filename), null, function() { loadHistory(); });
}

/* Utils */
function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function ea(s) {
  return String(s).replace(/'/g, '&#39;').replace(/"/g, '&quot;');
}

/* Init */
loadHistory();
document.getElementById('q').onkeydown   = function(e) { if ((e || window.event).keyCode === 13) { doSearch(); } };
document.getElementById('url').onkeydown = function(e) { if ((e || window.event).keyCode === 13) { queueUrl(); } };
</script>
</body>
</html>
